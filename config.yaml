window:
  title_contains: "Clash of Clans"
  title_match_mode: starts_with
  activate_before_click: true

runtime:
  dry_run: false
  poll_interval_seconds: 0.60
  require_target_focus: true
  focus_check_interval_seconds: 5
  cv_profile: cv_13
  stop_after_cycles: 0
  max_next_attempts_per_cycle: 50
  debug_dir: "debug_saida"
  debug_images: errors_only

vision:
  template_confidence: 0.82
  template_confidence_by_asset:
    start_button: 0.50
    procurar_partida: 0.50
    search_button: 0.50
    start_button_2: 0.60
    return_button: 0.75
  template_search_regions:
    procurar_partida: {x_ratio: 0.05, y_ratio: 0.62, w_ratio: 0.26, h_ratio: 0.18}
    search_button: {x_ratio: 0.02, y_ratio: 0.58, w_ratio: 0.28, h_ratio: 0.22}
    start_button_2: {x_ratio: 0.74, y_ratio: 0.78, w_ratio: 0.23, h_ratio: 0.16}
  ocr_enabled: true
  ocr_engine: pytesseract
  tesseract_cmd: "runtime/tesseract/tesseract.exe"
  pytesseract:
    psm_modes: [7, 6, 11]
    upscale_factor: 3.0
    blur_kernel: 3
    use_adaptive_threshold: true
    whitelist: "0123456789.,KMkm "
    expected_min_digits: 4
    expected_max_digits: 7
  attack_loot_ocr:
    psm_modes: [7]
    upscale_factor: 2.0
    blur_kernel: 1
    use_adaptive_threshold: false
    whitelist: "0123456789.,KMkm "
    expected_min_digits: 4
    expected_max_digits: 7
  resource_threshold: 1000000
  resource_roi:
    x: 20
    y: 70
    w: 460
    h: 130
  attack_loot_rois:
    gold: {x_ratio: 0.060, y_ratio: 0.144, w_ratio: 0.115, h_ratio: 0.045}
    elixir: {x_ratio: 0.060, y_ratio: 0.186, w_ratio: 0.115, h_ratio: 0.045}
    dark_elixir: {x_ratio: 0.060, y_ratio: 0.228, w_ratio: 0.115, h_ratio: 0.045}
  red_mask:
    lower1: [0, 80, 60]
    upper1: [10, 255, 255]
    lower2: [170, 80, 60]
    upper2: [180, 255, 255]

assets:
  start_button: "assets/start_button.png"
  start_button_2: "assets/start_button_2.png"
  procurar_partida: "assets/procurar_partida.png"
  search_button: "assets/search_button.png"
  next_button: "assets/next_button.png"
  confirm_action_button: "assets/confirm_action_button.png"
  end_action_button: "assets/end_action_button.png"
  return_button: "assets/return_button.png"

flow:
  target_mode: direct_attack
  attack_loot_minimums:
    gold: 500000
    elixir: 500000
  attack_loot_total_minimum: 1000000
  pre_search_steps:
    - start_button
    - procurar_partida
    - start_button_2
  optional_pre_search_steps:
    - start_button_2
  pre_search_step_timeouts:
    start_button: 3
    procurar_partida: 3
    start_button_2: 2
  pre_search_step_after_delays:
    start_button: 1.00
    procurar_partida: 1.00
    start_button_2: 1.00
  use_confirm_action_button: false
  use_end_action_button: false
  use_return_button: false
  battle_screen_delay_seconds: 2
  attack_loot_ready_timeout_seconds: 2.5
  next_base_delay_seconds: 2.5
  battle_zoom_out:
    enabled: true
    scroll_clicks: 12
    settle_seconds: 0.8
  post_deploy_min_seconds: 20
  battle_finished_assets:
    - return_button
  return_steps:
    - return_button
  search_result_timeout_seconds: 30
  action_timeout_seconds: 180

